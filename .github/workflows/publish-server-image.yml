name: Publish Server Image

on:
  release:
    types: [published]
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - cuda-11-builder-support
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Server image CUDA ${{ matrix.cuda.version }} / Ubuntu ${{ matrix.cuda.ubuntu }} / ${{ matrix.platform.arch }}
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        cuda:
          - version: 13.1.0
            ubuntu: "24.04"
          - version: 13.0.2
            ubuntu: "24.04"
          - version: 12.9.1
            ubuntu: "24.04"
          - version: 12.8.1
            ubuntu: "24.04"
          - version: 12.6.2
            ubuntu: "24.04"
          - version: 12.5.1
            ubuntu: "22.04"
          - version: 12.4.1
            ubuntu: "22.04"
          - version: 11.8.0
            ubuntu: "22.04"
          - version: 11.7.1
            ubuntu: "22.04"
        platform:
          - arch: amd64
            docker_platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            docker_platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Free runner disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /usr/local/.ghcup /usr/share/swift
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: image-tags
        run: |
          set -euo pipefail
          {
            echo 'server<<EOF'
            echo 'ghcr.io/${{ github.repository_owner }}/lupine-server:cuda-${{ matrix.cuda.version }}-ubuntu${{ matrix.cuda.ubuntu }}-${{ matrix.platform.arch }}'
            if [ '${{ github.event_name }}' = 'release' ]; then
              echo 'ghcr.io/${{ github.repository_owner }}/lupine-server:${{ github.event.release.tag_name }}-cuda-${{ matrix.cuda.version }}-ubuntu${{ matrix.cuda.ubuntu }}-${{ matrix.platform.arch }}'
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: server
          platforms: ${{ matrix.platform.docker_platform }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            CUDA_VERSION=${{ matrix.cuda.version }}
            UBUNTU_VERSION=${{ matrix.cuda.ubuntu }}
          tags: ${{ steps.image-tags.outputs.server }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  publish:
    name: Publish server manifest CUDA ${{ matrix.cuda.version }} / Ubuntu ${{ matrix.cuda.ubuntu }}
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cuda:
          - version: 13.1.0
            ubuntu: "24.04"
          - version: 13.0.2
            ubuntu: "24.04"
          - version: 12.9.1
            ubuntu: "24.04"
          - version: 12.8.1
            ubuntu: "24.04"
          - version: 12.6.2
            ubuntu: "24.04"
          - version: 12.5.1
            ubuntu: "22.04"
          - version: 12.4.1
            ubuntu: "22.04"
          - version: 11.8.0
            ubuntu: "22.04"
          - version: 11.7.1
            ubuntu: "22.04"

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish server manifest
        run: |
          set -euo pipefail
          image="ghcr.io/${{ github.repository_owner }}/lupine-server:cuda-${{ matrix.cuda.version }}-ubuntu${{ matrix.cuda.ubuntu }}"
          docker buildx imagetools create \
            --tag "${image}" \
            "${image}-amd64" \
            "${image}-arm64"
          if [ '${{ github.event_name }}' = 'release' ]; then
            release_image="ghcr.io/${{ github.repository_owner }}/lupine-server:${{ github.event.release.tag_name }}-cuda-${{ matrix.cuda.version }}-ubuntu${{ matrix.cuda.ubuntu }}"
            docker buildx imagetools create \
              --tag "${release_image}" \
              "${release_image}-amd64" \
              "${release_image}-arm64"
          fi
