name: Publish Client Image

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - cuda-11-builder-support
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Client image CUDA ${{ matrix.cuda.version }} / Ubuntu ${{ matrix.cuda.ubuntu }} / ${{ matrix.platform.arch }}
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        cuda:
          - version: 13.1.0
            ubuntu: "24.04"
          - version: 13.0.2
            ubuntu: "24.04"
          - version: 12.9.1
            ubuntu: "24.04"
          - version: 12.8.1
            ubuntu: "24.04"
          - version: 12.6.2
            ubuntu: "24.04"
          - version: 12.5.1
            ubuntu: "22.04"
          - version: 12.4.1
            ubuntu: "22.04"
          - version: 11.8.0
            ubuntu: "22.04"
          - version: 11.7.1
            ubuntu: "22.04"
        platform:
          - arch: amd64
            docker_platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            docker_platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # CUDA image builds need substantial buildkit snapshot space, so reclaim
      # preinstalled tooling this job never uses.
      - name: Free runner disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/hostedtoolcache \
            /usr/local/.ghcup /usr/share/swift /usr/local/share/powershell
          sudo docker image prune --all --force > /dev/null
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: client
          platforms: ${{ matrix.platform.docker_platform }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            CUDA_VERSION=${{ matrix.cuda.version }}
            UBUNTU_VERSION=${{ matrix.cuda.ubuntu }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/lupine-client:cuda-${{ matrix.cuda.version }}-ubuntu${{ matrix.cuda.ubuntu }}-${{ matrix.platform.arch }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and publish slim client tag
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: client-slim
          platforms: ${{ matrix.platform.docker_platform }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            CUDA_VERSION=${{ matrix.cuda.version }}
            UBUNTU_VERSION=${{ matrix.cuda.ubuntu }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/lupine-client:cuda-${{ matrix.cuda.version }}-ubuntu${{ matrix.cuda.ubuntu }}-slim-${{ matrix.platform.arch }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  publish:
    name: Publish client manifests CUDA ${{ matrix.cuda.version }} / Ubuntu ${{ matrix.cuda.ubuntu }}
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cuda:
          - version: 13.1.0
            ubuntu: "24.04"
          - version: 13.0.2
            ubuntu: "24.04"
          - version: 12.9.1
            ubuntu: "24.04"
          - version: 12.8.1
            ubuntu: "24.04"
          - version: 12.6.2
            ubuntu: "24.04"
          - version: 12.5.1
            ubuntu: "22.04"
          - version: 12.4.1
            ubuntu: "22.04"
          - version: 11.8.0
            ubuntu: "22.04"
          - version: 11.7.1
            ubuntu: "22.04"

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish client manifests
        run: |
          image="ghcr.io/${{ github.repository_owner }}/lupine-client:cuda-${{ matrix.cuda.version }}-ubuntu${{ matrix.cuda.ubuntu }}"
          docker buildx imagetools create \
            --tag "${image}" \
            "${image}-amd64" \
            "${image}-arm64"
          docker buildx imagetools create \
            --tag "${image}-slim" \
            "${image}-slim-amd64" \
            "${image}-slim-arm64"
