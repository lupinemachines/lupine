name: GPU Integration on GCE

# Expected repository variables:
#   GCP_PROJECT_ID, GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT
#
# Keep GCP_SERVICE_ACCOUNT on a custom role rather than project Owner/Editor.
# It should be bound through a Workload Identity Provider condition restricted
# to this repository's numeric GitHub IDs, this workflow path, and trusted refs.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  gpu-integration:
    name: ${{ matrix.name }} GPU integration on GCE L4
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 300

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: cuda13-0
            name: CUDA 13.0
            client_image: nvidia/cuda:13.0.2-devel-ubuntu24.04
            samples_ref: v13.0
            pytorch_index_url: https://download.pytorch.org/whl/cu128
          - label: cuda12-4
            name: CUDA 12.4
            client_image: nvidia/cuda:12.4.1-devel-ubuntu22.04
            samples_ref: v12.4.1
            pytorch_index_url: https://download.pytorch.org/whl/cu124
          - label: cuda11-8
            name: CUDA 11.8
            client_image: nvidia/cuda:11.8.0-devel-ubuntu22.04
            samples_ref: v11.8
            pytorch_index_url: https://download.pytorch.org/whl/cu118

    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_ZONE: us-central1-a
      GCP_FALLBACK_ZONES: >-
        us-central1-c us-central1-b
        us-west1-a us-west1-b us-west1-c
        us-east1-b us-east1-c us-east1-d
        us-east4-a us-east4-c
        us-west4-a us-west4-c
        northamerica-northeast1-b northamerica-northeast1-c
        northamerica-northeast2-a northamerica-northeast2-b
        europe-west1-b europe-west1-c
      GCP_NETWORK: default
      MACHINE_TYPE: g2-standard-4
      VM_IMAGE_PROJECT: ml-images
      VM_IMAGE_FAMILY: common-cu129-ubuntu-2404-nvidia-580
      VM_MAX_RUN_DURATION: 260m
      COMPLIANCE_TIMEOUT: 240m
      CUDA_SAMPLE_TIMEOUT: 120
      CUDA_LONG_SAMPLE_TIMEOUT: 600
      CUDA_SAMPLE_JOBS: 16
      SSH_COMMAND_TIMEOUT: 120
      PYTORCH_TEST_TIMEOUT: 180
      USE_SPOT: "false"
      VM_NAME: lupine-gpu-ci-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.label }}
      VM_TAG: lupine-gpu-ci-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.label }}
      FIREWALL_ALLOW_RULE: lupine-gpu-ci-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.label }}-allow
      FIREWALL_DENY_RULE: lupine-gpu-ci-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.label }}-deny
      CLIENT_IMAGE: lupine-gpu-integration:${{ matrix.label }}-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Prepare SSH key and runner allowlist
        run: |
          set -euo pipefail
          ssh_dir="$RUNNER_TEMP/gce-ssh"
          mkdir -p "$ssh_dir"
          ssh-keygen -t ed25519 -N '' -C "gha-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" -f "$ssh_dir/id_ed25519"
          chmod 700 "$ssh_dir"
          chmod 600 "$ssh_dir/id_ed25519"

          runner_ip="$(curl -fsS https://api.ipify.org)"
          test -n "$runner_ip"

          {
            echo "SSH_DIR=$ssh_dir"
            echo "RUNNER_IP=$runner_ip"
          } >> "$GITHUB_ENV"

      - name: Create locked-down firewall rules
        run: |
          set -euo pipefail

          create_firewall_rule() {
            local name="$1"
            local action="$2"
            local priority="$3"
            local rules="$4"
            local source_ranges="$5"

            gcloud compute firewall-rules create "$name" \
              --project="$GCP_PROJECT_ID" \
              --network="$GCP_NETWORK" \
              --direction=INGRESS \
              --priority="$priority" \
              --action="$action" \
              --rules="$rules" \
              --source-ranges="$source_ranges" \
              --target-tags="$VM_TAG"
          }

          create_firewall_rule \
            "$FIREWALL_ALLOW_RULE" \
            ALLOW \
            800 \
            tcp:22 \
            "$RUNNER_IP/32"

          create_firewall_rule \
            "$FIREWALL_DENY_RULE" \
            DENY \
            900 \
            tcp:1-65535,udp:1-65535,icmp,esp,ah,sctp \
            0.0.0.0/0

      - name: Create L4 server VM
        run: |
          set -euo pipefail
          startup_script="$RUNNER_TEMP/gce-startup.sh"
          cat > "$startup_script" <<'SCRIPT'
          #!/usr/bin/env bash
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates docker.io libnghttp2-14
          rm -rf /var/lib/apt/lists/*
          SCRIPT

          # shellcheck disable=SC2206
          fallback_zones=($GCP_FALLBACK_ZONES)
          candidate_zones=("$GCP_ZONE" "${fallback_zones[@]}")

          vm_ip=""
          selected_zone=""
          for zone in "${candidate_zones[@]}"; do
            echo "Creating $MACHINE_TYPE in $zone"
            create_args=(
              "$VM_NAME"
              "--project=$GCP_PROJECT_ID"
              "--zone=$zone"
              "--machine-type=$MACHINE_TYPE"
              "--network=$GCP_NETWORK"
              "--tags=$VM_TAG"
              "--image-family=$VM_IMAGE_FAMILY"
              "--image-project=$VM_IMAGE_PROJECT"
              "--boot-disk-size=100GB"
              "--boot-disk-type=pd-balanced"
              "--maintenance-policy=TERMINATE"
              "--max-run-duration=$VM_MAX_RUN_DURATION"
              "--instance-termination-action=DELETE"
              "--no-service-account"
              "--no-scopes"
              "--metadata=block-project-ssh-keys=TRUE,enable-oslogin=FALSE,ssh-keys=gha:$(cat "$SSH_DIR/id_ed25519.pub")"
              "--metadata-from-file=startup-script=$startup_script"
              "--shielded-vtpm"
              "--shielded-integrity-monitoring"
              "--no-shielded-secure-boot"
            )

            if [[ "$USE_SPOT" == "true" ]]; then
              create_args+=("--provisioning-model=SPOT")
            fi

            if vm_ip="$(gcloud compute instances create "${create_args[@]}" \
              --format='value(networkInterfaces[0].accessConfigs[0].natIP)')"; then
              selected_zone="$zone"
              break
            fi

            echo "Could not create $MACHINE_TYPE in $zone; trying next candidate zone" >&2
            gcloud compute instances delete "$VM_NAME" \
              --project="$GCP_PROJECT_ID" \
              --zone="$zone" \
              --quiet >/dev/null 2>&1 || true
          done

          test -n "$vm_ip"
          test -n "$selected_zone"
          {
            echo "VM_IP=$vm_ip"
            echo "GCP_ZONE=$selected_zone"
          } >> "$GITHUB_ENV"

      - name: Free runner disk
        run: |
          set -euo pipefail
          sudo rm -rf \
            /opt/hostedtoolcache \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /usr/share/dotnet \
            "${AGENT_TOOLSDIRECTORY:-}" || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Write inline client image Dockerfile
        run: |
          cat > "${RUNNER_TEMP}/gpu-integration.Dockerfile" <<'EOF'
          # syntax=docker/dockerfile:1.7

          ARG BASE_IMAGE
          FROM ${BASE_IMAGE}

          ARG CUDA_SAMPLE_SKIP_LIST=""
          ARG CUDA_SAMPLES_CACHE_HIT="false"
          ARG CUDA_SAMPLES_REF=""

          ENV DEBIAN_FRONTEND=noninteractive \
              CUDA_HOME=/usr/local/cuda \
              CUDA_LIB_DIR=/usr/local/cuda/lib64 \
              CUDA_SAMPLES_DIR=/opt/cuda-samples-src \
              CUDA_SAMPLES_BUILD_DIR=/opt/cuda-samples-build \
              CUDA_SAMPLES_ARCH=89 \
              CCACHE_DIR=/opt/lupine/ccache \
              CCACHE_BASEDIR=/src \
              CCACHE_COMPILERCHECK=content \
              CCACHE_COMPRESS=true \
              PATH=/usr/local/cuda/bin:$PATH

          RUN apt-get update && apt-get install -y --no-install-recommends \
                bash \
                build-essential \
                ca-certificates \
                ccache \
                cmake \
                curl \
                freeglut3-dev \
                git \
                libfreeimage-dev \
                libgl-dev \
                libglu1-mesa-dev \
                libnghttp2-dev \
                libx11-dev \
                libxi-dev \
                libxmu-dev \
                ninja-build \
                openssh-client \
                python3 \
                python3-pip \
                python3-venv \
              && rm -rf /var/lib/apt/lists/*

          COPY --from=cuda_samples_src . /opt/cuda-samples-src
          COPY --from=cuda_samples_build . /opt/cuda-samples-build

          # Keep the expensive CUDA sample build before COPY . so regular
          # Lupine source changes do not invalidate this step. Warm runs copy
          # the restored Actions cache into the image and skip compilation.
          RUN --mount=type=cache,target=/opt/lupine/ccache bash <<'SCRIPT'
          set -euo pipefail

          if [[ "$CUDA_SAMPLES_CACHE_HIT" == "true" && -d "$CUDA_SAMPLES_DIR/.git" && -d "$CUDA_SAMPLES_BUILD_DIR" ]]; then
            git config --global --add safe.directory "$CUDA_SAMPLES_DIR"
            echo "Using restored CUDA sample cache"
            exit 0
          fi

          rm -rf "$CUDA_SAMPLES_DIR" "$CUDA_SAMPLES_BUILD_DIR"
          git clone https://github.com/NVIDIA/cuda-samples.git "$CUDA_SAMPLES_DIR"
          git config --global --add safe.directory "$CUDA_SAMPLES_DIR"
          if [[ -n "$CUDA_SAMPLES_REF" ]]; then
            git -C "$CUDA_SAMPLES_DIR" fetch --tags origin
            git -C "$CUDA_SAMPLES_DIR" checkout "$CUDA_SAMPLES_REF"
            git -C "$CUDA_SAMPLES_DIR" reset --hard "$CUDA_SAMPLES_REF"
          fi

          if [[ -n "$CUDA_SAMPLES_ARCH" ]]; then
            find "$CUDA_SAMPLES_DIR" -name CMakeLists.txt -exec sed -i -E \
              "s/set\(CMAKE_CUDA_ARCHITECTURES ([0-9 ]* )?$CUDA_SAMPLES_ARCH( [0-9 ]*)?\)/set(CMAKE_CUDA_ARCHITECTURES $CUDA_SAMPLES_ARCH)/" {} +
          fi

          export CCACHE_BASEDIR="$CUDA_SAMPLES_DIR"
          if [[ -f "$CUDA_SAMPLES_DIR/CMakeLists.txt" && ( -d "$CUDA_SAMPLES_DIR/cpp" || -d "$CUDA_SAMPLES_DIR/Samples" ) ]]; then
            cmake -S "$CUDA_SAMPLES_DIR" -B "$CUDA_SAMPLES_BUILD_DIR" \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CUDA_COMPILER_LAUNCHER=ccache
            cmake --build "$CUDA_SAMPLES_BUILD_DIR" --parallel "$(nproc)"
          else
            make -C "$CUDA_SAMPLES_DIR" -j"$(nproc)"
          fi
          ccache --show-stats || true
          SCRIPT

          WORKDIR /src
          COPY . /src
          EOF

      - name: Restore CUDA sample cache
        id: cuda-samples-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/cuda-samples-cache-${{ matrix.label }}
          key: gpu-integration-cuda-samples-v2-${{ matrix.label }}-${{ matrix.samples_ref }}

      - name: Prepare CUDA sample cache context
        run: |
          set -euo pipefail
          cache_dir="${RUNNER_TEMP}/cuda-samples-cache-${{ matrix.label }}"
          mkdir -p "$cache_dir/src" "$cache_dir/build"
          touch "$cache_dir/src/.keep" "$cache_dir/build/.keep"

      - name: Build ${{ matrix.name }} client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ runner.temp }}/gpu-integration.Dockerfile
          load: true
          tags: ${{ env.CLIENT_IMAGE }}
          build-contexts: |
            cuda_samples_src=${{ runner.temp }}/cuda-samples-cache-${{ matrix.label }}/src
            cuda_samples_build=${{ runner.temp }}/cuda-samples-cache-${{ matrix.label }}/build
          build-args: |
            BASE_IMAGE=${{ matrix.client_image }}
            CUDA_SAMPLES_CACHE_HIT=${{ steps.cuda-samples-cache.outputs.cache-hit == 'true' }}
            CUDA_SAMPLE_SKIP_LIST=${{ env.CUDA_SAMPLE_SKIP_LIST }}
            CUDA_SAMPLES_REF=${{ matrix.samples_ref }}

      - name: Extract CUDA sample cache
        if: steps.cuda-samples-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          cache_dir="${RUNNER_TEMP}/cuda-samples-cache-${{ matrix.label }}"
          rm -rf "$cache_dir"
          mkdir -p "$cache_dir/src" "$cache_dir/build"
          container_id="$(docker create "$CLIENT_IMAGE")"
          trap 'docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT
          docker cp "$container_id:/opt/cuda-samples-src/." "$cache_dir/src/"
          if ! docker cp "$container_id:/opt/cuda-samples-build/." "$cache_dir/build/" 2>/tmp/cuda-samples-build-copy.err; then
            echo "No separate CUDA samples build directory found; caching source tree only"
            touch "$cache_dir/build/.keep"
          fi
          du -sh "$cache_dir"

      - name: Save CUDA sample cache
        if: steps.cuda-samples-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/cuda-samples-cache-${{ matrix.label }}
          key: ${{ steps.cuda-samples-cache.outputs.cache-primary-key }}

      - name: Wait for SSH and NVIDIA driver
        run: |
          set -euo pipefail
          ssh_base=(
            ssh
            -i "$SSH_DIR/id_ed25519"
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=accept-new
            -o UserKnownHostsFile="$SSH_DIR/known_hosts"
            -o ConnectTimeout=10
            "gha@$VM_IP"
          )

          for _ in $(seq 1 120); do
            if "${ssh_base[@]}" 'echo ready' >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done

          "${ssh_base[@]}" '
            deadline=$((SECONDS + 1200))
            until command -v nvidia-smi >/dev/null 2>&1 && nvidia-smi -L; do
              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "NVIDIA driver did not become ready before the timeout" >&2
                exit 1
              fi
              sleep 15
            done

            deadline=$((SECONDS + 300))
            until command -v docker >/dev/null 2>&1 && sudo docker info >/dev/null 2>&1; do
              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "Docker did not become ready before the timeout" >&2
                exit 1
              fi
              sleep 5
            done
          '

      - name: Install docker pussh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p ~/.docker/cli-plugins
          gh api "repos/psviderski/unregistry/contents/docker-pussh?ref=v0.4.3" \
            --jq .content | base64 -d > ~/.docker/cli-plugins/docker-pussh
          chmod +x ~/.docker/cli-plugins/docker-pussh
          docker pussh --version

      - name: Push client image to L4 VM
        run: |
          set -euo pipefail
          cat > "$SSH_DIR/config" <<EOF
          Host lupine-gpu-ci
            HostName $VM_IP
            User gha
            IdentityFile $SSH_DIR/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile $SSH_DIR/known_hosts
          EOF

          docker pussh "$CLIENT_IMAGE" lupine-gpu-ci -F "$SSH_DIR/config"

      - name: Run ${{ matrix.name }} client inside L4 VM
        run: |
          set -euo pipefail

          if [[ -e /dev/nvidiactl || -e /dev/nvidia0 ]]; then
            echo "local NVIDIA device is visible on the GitHub runner; client/server separation is invalid" >&2
            exit 1
          fi
          if command -v nvidia-smi >/dev/null 2>&1 && nvidia-smi -L >/dev/null 2>&1; then
            echo "local NVIDIA GPU is visible on the GitHub runner; client/server separation is invalid" >&2
            exit 1
          fi

          ssh_base=(
            ssh
            -i "$SSH_DIR/id_ed25519"
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$SSH_DIR/known_hosts"
            -o ConnectTimeout=15
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
            "gha@$VM_IP"
          )
          scp_base=(
            scp
            -i "$SSH_DIR/id_ed25519"
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$SSH_DIR/known_hosts"
          )

          remote_ssh="/home/gha/lupine-ssh"
          remote_results="/home/gha/lupine-results-${{ matrix.label }}"
          "${ssh_base[@]}" "rm -rf '$remote_results' '$remote_ssh'; mkdir -p '$remote_results' '$remote_ssh'"
          "${scp_base[@]}" "$SSH_DIR/id_ed25519" "$SSH_DIR/known_hosts" "gha@$VM_IP:$remote_ssh/"
          "${ssh_base[@]}" "chmod 700 '$remote_ssh'; chmod 600 '$remote_ssh/id_ed25519'"

          remote_status=0
          "${ssh_base[@]}" \
            "CLIENT_IMAGE='$CLIENT_IMAGE' CUDA_SAMPLE_JOBS='$CUDA_SAMPLE_JOBS' CUDA_SAMPLE_TIMEOUT='$CUDA_SAMPLE_TIMEOUT' CUDA_LONG_SAMPLE_TIMEOUT='$CUDA_LONG_SAMPLE_TIMEOUT' SSH_COMMAND_TIMEOUT='$SSH_COMMAND_TIMEOUT' COMPLIANCE_TIMEOUT='$COMPLIANCE_TIMEOUT' PYTORCH_TEST_TIMEOUT='$PYTORCH_TEST_TIMEOUT' PYTORCH_INDEX_URL='${{ matrix.pytorch_index_url }}' MATRIX_LABEL='${{ matrix.label }}' GITHUB_RUN_ID='${GITHUB_RUN_ID:-local}' GITHUB_RUN_ATTEMPT='${GITHUB_RUN_ATTEMPT:-1}' bash -s" <<'REMOTE' || remote_status=$?
          set -euo pipefail
          sudo docker run --rm \
            --add-host=host.docker.internal:host-gateway \
            -e CUDA_SAMPLE_JOBS="$CUDA_SAMPLE_JOBS" \
            -e CUDA_SAMPLE_TIMEOUT="$CUDA_SAMPLE_TIMEOUT" \
            -e CUDA_LONG_SAMPLE_TIMEOUT="$CUDA_LONG_SAMPLE_TIMEOUT" \
            -e SSH_COMMAND_TIMEOUT="$SSH_COMMAND_TIMEOUT" \
            -e COMPLIANCE_TIMEOUT="$COMPLIANCE_TIMEOUT" \
            -e PYTORCH_TEST_TIMEOUT="$PYTORCH_TEST_TIMEOUT" \
            -e PYTORCH_INDEX_URL="$PYTORCH_INDEX_URL" \
            -e SERVER_HOST=host.docker.internal \
            -e SERVER_USER=gha \
            -e SERVER_SSH_TARGET=gha@host.docker.internal \
            -e MATRIX_LABEL="$MATRIX_LABEL" \
            -e GITHUB_RUN_ID="$GITHUB_RUN_ID" \
            -e GITHUB_RUN_ATTEMPT="$GITHUB_RUN_ATTEMPT" \
            -v /home/gha/lupine-ssh:/ssh:ro \
            -v /home/gha/lupine-results-"$MATRIX_LABEL":/results \
            "$CLIENT_IMAGE" \
            bash -lc '
              set -euo pipefail
              if [[ -e /dev/nvidiactl || -e /dev/nvidia0 ]]; then
                echo "NVIDIA device is visible inside the client container; client/server separation is invalid" >&2
                exit 1
              fi
              if command -v nvidia-smi >/dev/null 2>&1 && nvidia-smi -L >/dev/null 2>&1; then
                echo "NVIDIA GPU is visible inside the client container; client/server separation is invalid" >&2
                exit 1
              fi

              mkdir -p /tmp/lupine-ssh
              cp /ssh/id_ed25519 /tmp/lupine-ssh/id_ed25519
              cp /ssh/known_hosts /tmp/lupine-ssh/known_hosts
              chmod 700 /tmp/lupine-ssh
              chmod 600 /tmp/lupine-ssh/id_ed25519

              export CUDA_HOME=/usr/local/cuda
              export CUDA_LIB_DIR=/usr/local/cuda/lib64
              export PATH=/usr/local/cuda/bin:$PATH
              export REPO_ROOT=/src
              export LUPINE_BUILD_DIR=/tmp/lupine-build
              export CCACHE_DIR=/tmp/lupine-ccache
              mkdir -p "$LUPINE_BUILD_DIR" "$CCACHE_DIR"
              export CCACHE_BASEDIR=/src
              export CCACHE_COMPILERCHECK=content
              export CCACHE_COMPRESS=true
              export LUPINE_LIB="$LUPINE_BUILD_DIR/libcuda.so.1"
              export LUPINE_DISABLE_LOCAL=1
              export SERVER_LOCAL_BIN="$LUPINE_BUILD_DIR/lupine_driver_server"
              export SERVER_REMOTE_BIN="/tmp/lupine-driver-server-${MATRIX_LABEL}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
              export SSH_OPTS="-i /tmp/lupine-ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15 -o ConnectionAttempts=1 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
              export SAMPLE_TIMEOUT="$CUDA_SAMPLE_TIMEOUT"
              export LONG_SAMPLE_TIMEOUT="$CUDA_LONG_SAMPLE_TIMEOUT"
              export TEST_TIMEOUT="$PYTORCH_TEST_TIMEOUT"
              export PYTORCH_SKIP_LIST=compile_elementwise,microgpt_train
              export CUDA_SAMPLES_DIR=/opt/cuda-samples-src
              export CUDA_SAMPLES_BUILD_DIR=/opt/cuda-samples-build
              export CUDA_SAMPLES_ARCH=89

              python3 -m venv /tmp/venv-pytorch
              /tmp/venv-pytorch/bin/pip install --upgrade pip >/dev/null
              /tmp/venv-pytorch/bin/pip install numpy >/dev/null
              /tmp/venv-pytorch/bin/pip install --index-url "$PYTORCH_INDEX_URL" torch >/dev/null
              export PYTHON_BIN=/tmp/venv-pytorch/bin/python

              cmake -S /src -B "$LUPINE_BUILD_DIR" \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCUDAToolkit_ROOT="$CUDA_HOME" \
                -DCMAKE_LIBRARY_PATH="$CUDA_HOME/lib64/stubs" \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CUDA_COMPILER_LAUNCHER=ccache
              cmake --build "$LUPINE_BUILD_DIR" --parallel \
                --target lupine_driver lupine_nvml lupine_driver_server
              ln -sf libcuda.so.1 "$LUPINE_BUILD_DIR/libcuda.so"
              ln -sf libnvidia-ml.so.1 "$LUPINE_BUILD_DIR/libnvidia-ml.so"

              cuda_status=0
              RESULTS_DIR="/results/test/cuda-samples/results/$(date +%Y%m%d-%H%M%S)" \
                BUILD_SAMPLES=0 SAMPLE_SUITE=compliance \
                /src/test/run_cuda_samples.sh || cuda_status=$?

              pytorch_status=0
              RESULTS_DIR="/results/test/pytorch/results/$(date +%Y%m%d-%H%M%S)" \
                /src/test/run_pytorch_lupine_tests.sh || pytorch_status=$?

              custom_status=0
              SERVER_PORT=20900 /src/test/run_custom_tests.sh || custom_status=$?

              if [[ "$cuda_status" -ne 0 || "$pytorch_status" -ne 0 || "$custom_status" -ne 0 ]]; then
                echo "CUDA samples exited $cuda_status; PyTorch exited $pytorch_status; custom tests exited $custom_status" >&2
                exit 1
              fi
            '
          REMOTE

          results_tgz="$RUNNER_TEMP/gpu-results-${{ matrix.label }}.tgz"
          "${ssh_base[@]}" "cd '$remote_results' && [ -d test ] && tar -czf - test || true" > "$results_tgz"
          if [[ -s "$results_tgz" ]]; then
            tar -xzf "$results_tgz"
          fi

          exit "$remote_status"

      - name: Upload compliance results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gpu-integration-results-${{ matrix.label }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            test/cuda-samples/results/
            test/pytorch/results/
          if-no-files-found: ignore

      - name: Report sample results
        id: sample_results
        if: always()
        run: |
          set -uo pipefail
          rd="$(ls -td test/cuda-samples/results/*/ 2>/dev/null | head -n1 || true)"
          if [[ -z "${rd:-}" ]]; then
            echo "No CUDA sample results dir found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "### CUDA samples (${{ matrix.label }})"
            echo '```'
            [[ -f "$rd/summary.txt" ]] && cat "$rd/summary.txt"
            [[ -f "$rd/coverage.txt" ]] && { echo; cat "$rd/coverage.txt"; }
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ -f "$rd/summary.txt" ]]; then
            awk '{print tolower($1)"="$2}' "$rd/summary.txt" >> "$GITHUB_OUTPUT"
          fi
          cov=""
          if [[ -f "$rd/coverage.txt" ]]; then
            cov="$(grep 'coverage:' "$rd/coverage.txt" | sed -E 's/^CUDA sample coverage: /coverage=/')"
          fi
          if [[ -n "${cov:-}" ]]; then
            echo "$cov" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh Google Cloud credentials for cleanup
        if: always()
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Tear down GCE resources
        if: always()
        run: |
          set -euo pipefail

          # shellcheck disable=SC2206
          fallback_zones=($GCP_FALLBACK_ZONES)
          candidate_zones=("$GCP_ZONE" "${fallback_zones[@]}")

          delete_pids=()
          for zone in "${candidate_zones[@]}"; do
            gcloud compute instances delete "$VM_NAME" \
              --project="$GCP_PROJECT_ID" \
              --zone="$zone" \
              --quiet &
            delete_pids+=("$!")
          done

          for rule in "$FIREWALL_ALLOW_RULE" "$FIREWALL_DENY_RULE"; do
            gcloud compute firewall-rules delete "$rule" \
              --project="$GCP_PROJECT_ID" \
              --quiet &
            delete_pids+=("$!")
          done

          for pid in "${delete_pids[@]}"; do
            wait "$pid" || true
          done

          leftovers=0
          check_pids=()
          for zone in "${candidate_zones[@]}"; do
            (! gcloud compute instances describe "$VM_NAME" \
              --project="$GCP_PROJECT_ID" \
              --zone="$zone" >/dev/null 2>&1) &
            check_pids+=("$!")
          done

          for rule in "$FIREWALL_ALLOW_RULE" "$FIREWALL_DENY_RULE"; do
            (! gcloud compute firewall-rules describe "$rule" \
              --project="$GCP_PROJECT_ID" >/dev/null 2>&1) &
            check_pids+=("$!")
          done

          for pid in "${check_pids[@]}"; do
            if ! wait "$pid"; then
              leftovers=1
            fi
          done

          exit "$leftovers"
