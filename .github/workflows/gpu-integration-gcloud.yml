name: GPU Integration on GCE

# Expected repository variables:
#   GCP_PROJECT_ID, GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT
#
# Keep GCP_SERVICE_ACCOUNT on a custom role rather than project Owner/Editor.
# It should be bound through a Workload Identity Provider condition restricted
# to this repository's numeric GitHub IDs, this workflow path, and trusted refs.

on:
  pull_request:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_ZONE: us-central1-a
  GCP_FALLBACK_ZONES: >-
    us-central1-c us-central1-b
    us-west1-a us-west1-b us-west1-c
    us-east1-b us-east1-c us-east1-d
    us-east4-a us-east4-c
    us-west4-a us-west4-c
    northamerica-northeast1-b northamerica-northeast1-c
    northamerica-northeast2-a northamerica-northeast2-b
    europe-west1-b europe-west1-c
  GCP_NETWORK: default
  MACHINE_TYPE: g2-standard-4
  SERVER_CUDA_VERSION: 12.9.1
  SERVER_UBUNTU_VERSION: "24.04"
  VM_IMAGE_PROJECT: ml-images
  VM_IMAGE_FAMILY: common-cu129-ubuntu-2404-nvidia-580
  VM_MAX_RUN_DURATION: 260m
  COMPLIANCE_TIMEOUT: 240m
  CUDA_SAMPLE_TIMEOUT: 120
  CUDA_LONG_SAMPLE_TIMEOUT: 600
  CUDA_SAMPLE_JOBS: 8
  PYTORCH_TEST_TIMEOUT: 180
  USE_SPOT: "false"
  VM_NAME: lupine-gpu-ci-${{ github.run_id }}-${{ github.run_attempt }}
  VM_TAG: lupine-gpu-ci-${{ github.run_id }}-${{ github.run_attempt }}
  FIREWALL_DENY_RULE: lupine-gpu-ci-${{ github.run_id }}-${{ github.run_attempt }}-deny

jobs:
  provision-l4:
    name: Provision GCE L4
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 80

    outputs:
      vm_ip: ${{ steps.create-vm.outputs.vm_ip }}
      gcp_zone: ${{ steps.create-vm.outputs.gcp_zone }}
      vm_name: ${{ env.VM_NAME }}
      vm_tag: ${{ env.VM_TAG }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Free runner disk
        run: |
          set -euo pipefail
          sudo rm -rf \
            /opt/hostedtoolcache \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /usr/share/dotnet \
            "${AGENT_TOOLSDIRECTORY:-}" || true
          df -h

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Prepare SSH key and provision runner firewall
        run: |
          set -euo pipefail
          ssh_dir="$RUNNER_TEMP/gce-ssh"
          mkdir -p "$ssh_dir"
          ssh-keygen -t ed25519 -N '' -C "gha-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" -f "$ssh_dir/id_ed25519"
          chmod 700 "$ssh_dir"
          chmod 600 "$ssh_dir/id_ed25519"

          runner_ip="$(curl -fsS https://api.ipify.org)"
          test -n "$runner_ip"

          gcloud compute firewall-rules create "${VM_NAME}-provision-allow" \
            --project="$GCP_PROJECT_ID" \
            --network="$GCP_NETWORK" \
            --direction=INGRESS \
            --priority=800 \
            --action=ALLOW \
            --rules=tcp:22,tcp:14900-16999,tcp:20100-20999 \
            --source-ranges="$runner_ip/32" \
            --target-tags="$VM_TAG"

          {
            echo "SSH_DIR=$ssh_dir"
            echo "RUNNER_IP=$runner_ip"
          } >> "$GITHUB_ENV"

      - name: Build server artifact
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            cmake \
            curl \
            libnghttp2-dev \
            ninja-build

          cuda_keyring="$RUNNER_TEMP/cuda-keyring.deb"
          curl -fsSLo "$cuda_keyring" \
            https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i "$cuda_keyring"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cuda-cudart-dev-12-9 \
            cuda-driver-dev-12-9 \
            cuda-nvcc-12-9 \
            cuda-nvml-dev-12-9

          export CUDA_HOME=/usr/local/cuda-12.9
          export PATH="$CUDA_HOME/bin:$PATH"
          cmake -S "$PWD" -B "$PWD/build-server" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCUDAToolkit_ROOT="$CUDA_HOME" \
            -DCMAKE_LIBRARY_PATH="$CUDA_HOME/lib64/stubs"
          cmake --build "$PWD/build-server" --parallel --target lupine_driver_server

      - name: Save server build cache
        uses: actions/cache/save@v4
        with:
          path: build-server
          key: gpu-integration-server-build-${{ github.sha }}

      - name: Create locked-down deny firewall rule
        run: |
          set -euo pipefail
          gcloud compute firewall-rules create "$FIREWALL_DENY_RULE" \
            --project="$GCP_PROJECT_ID" \
            --network="$GCP_NETWORK" \
            --direction=INGRESS \
            --priority=900 \
            --action=DENY \
            --rules=tcp:1-65535,udp:1-65535,icmp,esp,ah,sctp \
            --source-ranges=0.0.0.0/0 \
            --target-tags="$VM_TAG"

      - name: Create L4 server VM
        id: create-vm
        run: |
          set -euo pipefail
          startup_script="$RUNNER_TEMP/gce-startup.sh"
          cat > "$startup_script" <<'SCRIPT'
          #!/usr/bin/env bash
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates libnghttp2-14
          rm -rf /var/lib/apt/lists/*
          SCRIPT

          # shellcheck disable=SC2206
          fallback_zones=($GCP_FALLBACK_ZONES)
          candidate_zones=("$GCP_ZONE" "${fallback_zones[@]}")

          vm_ip=""
          selected_zone=""
          for zone in "${candidate_zones[@]}"; do
            echo "Creating $MACHINE_TYPE in $zone"
            create_args=(
              "$VM_NAME"
              "--project=$GCP_PROJECT_ID"
              "--zone=$zone"
              "--machine-type=$MACHINE_TYPE"
              "--network=$GCP_NETWORK"
              "--tags=$VM_TAG"
              "--image-family=$VM_IMAGE_FAMILY"
              "--image-project=$VM_IMAGE_PROJECT"
              "--boot-disk-size=100GB"
              "--boot-disk-type=pd-balanced"
              "--maintenance-policy=TERMINATE"
              "--max-run-duration=$VM_MAX_RUN_DURATION"
              "--instance-termination-action=DELETE"
              "--no-service-account"
              "--no-scopes"
              "--metadata=block-project-ssh-keys=TRUE,enable-oslogin=FALSE,ssh-keys=gha:$(cat "$SSH_DIR/id_ed25519.pub")"
              "--metadata-from-file=startup-script=$startup_script"
              "--shielded-vtpm"
              "--shielded-integrity-monitoring"
              "--no-shielded-secure-boot"
            )

            if [[ "$USE_SPOT" == "true" ]]; then
              create_args+=("--provisioning-model=SPOT")
            fi

            if vm_ip="$(gcloud compute instances create "${create_args[@]}" \
              --format='value(networkInterfaces[0].accessConfigs[0].natIP)')"; then
              selected_zone="$zone"
              break
            fi

            echo "Could not create $MACHINE_TYPE in $zone; trying next candidate zone" >&2
            gcloud compute instances delete "$VM_NAME" \
              --project="$GCP_PROJECT_ID" \
              --zone="$zone" \
              --quiet >/dev/null 2>&1 || true
          done

          test -n "$vm_ip"
          test -n "$selected_zone"
          {
            echo "vm_ip=$vm_ip"
            echo "gcp_zone=$selected_zone"
          } >> "$GITHUB_OUTPUT"

      - name: Wait for SSH and NVIDIA driver
        run: |
          set -euo pipefail
          ssh_base=(
            ssh
            -i "$SSH_DIR/id_ed25519"
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=accept-new
            -o UserKnownHostsFile="$SSH_DIR/known_hosts"
            -o ConnectTimeout=10
            "gha@${{ steps.create-vm.outputs.vm_ip }}"
          )

          for _ in $(seq 1 120); do
            if "${ssh_base[@]}" 'echo ready' >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done

          "${ssh_base[@]}" '
            deadline=$((SECONDS + 1200))
            until command -v nvidia-smi >/dev/null 2>&1 && nvidia-smi -L; do
              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "NVIDIA driver did not become ready before the timeout" >&2
                exit 1
              fi
              sleep 15
            done
          '

      - name: Upload SSH key artifact
        uses: actions/upload-artifact@v7
        with:
          name: gpu-integration-ssh-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.SSH_DIR }}/id_ed25519
            ${{ env.SSH_DIR }}/known_hosts
          retention-days: 1

  gpu-integration:
    name: ${{ matrix.name }} GPU integration
    needs: provision-l4
    if: github.event.pull_request.head.repo.full_name == github.repository && needs.provision-l4.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 300

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - label: cuda13-1
            name: CUDA 13.1
            image: nvidia/cuda:13.1.0-devel-ubuntu24.04
            samples_ref: v13.1
            pytorch_index_url: https://download.pytorch.org/whl/cu128
            cuda_samples_port_base: 14900
            pytorch_port_base: 20100
            custom_port: 15990
          - label: cuda12-4
            name: CUDA 12.4
            image: nvidia/cuda:12.4.1-devel-ubuntu22.04
            samples_ref: v12.4.1
            pytorch_index_url: https://download.pytorch.org/whl/cu124
            cuda_samples_port_base: 15300
            pytorch_port_base: 20300
            custom_port: 15991
          - label: cuda11-8
            name: CUDA 11.8
            image: nvidia/cuda:11.8.0-devel-ubuntu22.04
            samples_ref: v11.8
            pytorch_index_url: https://download.pytorch.org/whl/cu118
            cuda_samples_port_base: 15600
            pytorch_port_base: 20500
            custom_port: 15992

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Create matrix runner firewall allow rule
        run: |
          set -euo pipefail
          runner_ip="$(curl -fsS https://api.ipify.org)"
          test -n "$runner_ip"
          allow_rule="${VM_NAME}-${{ matrix.label }}-allow"
          gcloud compute firewall-rules create "$allow_rule" \
            --project="$GCP_PROJECT_ID" \
            --network="$GCP_NETWORK" \
            --direction=INGRESS \
            --priority=800 \
            --action=ALLOW \
            --rules=tcp:22,tcp:14900-16999,tcp:20100-20999 \
            --source-ranges="$runner_ip/32" \
            --target-tags="${{ needs.provision-l4.outputs.vm_tag }}"
          echo "FIREWALL_ALLOW_RULE=$allow_rule" >> "$GITHUB_ENV"

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Free runner disk
        run: |
          set -euo pipefail
          sudo rm -rf \
            /opt/hostedtoolcache \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /usr/share/dotnet \
            "${AGENT_TOOLSDIRECTORY:-}" || true
          df -h

      - name: Download SSH key artifact
        uses: actions/download-artifact@v7
        with:
          name: gpu-integration-ssh-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/gce-ssh

      - name: Restore server build cache
        uses: actions/cache/restore@v4
        with:
          path: build-server
          key: gpu-integration-server-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Run ${{ matrix.name }} client against L4 server
        run: |
          set -euo pipefail

          if [[ -e /dev/nvidiactl || -e /dev/nvidia0 ]]; then
            echo "local NVIDIA device is visible on the GitHub runner; client/server separation is invalid" >&2
            exit 1
          fi
          if command -v nvidia-smi >/dev/null 2>&1 && nvidia-smi -L >/dev/null 2>&1; then
            echo "local NVIDIA GPU is visible on the GitHub runner; client/server separation is invalid" >&2
            exit 1
          fi

          chmod 700 "$RUNNER_TEMP/gce-ssh"
          chmod 600 "$RUNNER_TEMP/gce-ssh/id_ed25519"
          test -x "$PWD/build-server/lupine_driver_server"

          docker run --rm \
            -e CUDA_SAMPLE_JOBS="$CUDA_SAMPLE_JOBS" \
            -e CUDA_SAMPLE_TIMEOUT="$CUDA_SAMPLE_TIMEOUT" \
            -e CUDA_LONG_SAMPLE_TIMEOUT="$CUDA_LONG_SAMPLE_TIMEOUT" \
            -e COMPLIANCE_TIMEOUT="$COMPLIANCE_TIMEOUT" \
            -e PYTORCH_TEST_TIMEOUT="$PYTORCH_TEST_TIMEOUT" \
            -e MATRIX_LABEL="${{ matrix.label }}" \
            -e PYTORCH_INDEX_URL="${{ matrix.pytorch_index_url }}" \
            -e CUDA_SAMPLES_REF="${{ matrix.samples_ref }}" \
            -e CUDA_SAMPLES_PORT_BASE="${{ matrix.cuda_samples_port_base }}" \
            -e PYTORCH_PORT_BASE="${{ matrix.pytorch_port_base }}" \
            -e CUSTOM_PORT="${{ matrix.custom_port }}" \
            -e SERVER_HOST="${{ needs.provision-l4.outputs.vm_ip }}" \
            -e SERVER_USER=gha \
            -e SERVER_SSH_TARGET="gha@${{ needs.provision-l4.outputs.vm_ip }}" \
            -e GITHUB_RUN_ID="${GITHUB_RUN_ID:-local}" \
            -e GITHUB_RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT:-1}" \
            -v "$PWD:/src" \
            -v "$RUNNER_TEMP/gce-ssh:/ssh:ro" \
            -v "$PWD/build-server:/server-build:ro" \
            -w /src \
            ${{ matrix.image }} \
            bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update >/dev/null
              apt-get install -y --no-install-recommends \
                bash \
                build-essential \
                ca-certificates \
                cmake \
                curl \
                freeglut3-dev \
                git \
                libgl-dev \
                libglu1-mesa-dev \
                libnghttp2-dev \
                libx11-dev \
                libxi-dev \
                libxmu-dev \
                ninja-build \
                openssh-client \
                python3 \
                python3-pip \
                python3-venv >/dev/null

              mkdir -p /tmp/lupine-ssh
              cp /ssh/id_ed25519 /tmp/lupine-ssh/id_ed25519
              cp /ssh/known_hosts /tmp/lupine-ssh/known_hosts
              chmod 700 /tmp/lupine-ssh
              chmod 600 /tmp/lupine-ssh/id_ed25519

              export CUDA_HOME=/usr/local/cuda
              export CUDA_LIB_DIR=/usr/local/cuda/lib64
              export PATH=/usr/local/cuda/bin:$PATH
              export REPO_ROOT=/src
              export LUPINE_LIB=/tmp/lupine-build/libcuda.so.1
              export LUPINE_DISABLE_LOCAL=1
              export SERVER_LOCAL_BIN=/server-build/lupine_driver_server
              export SERVER_REMOTE_BIN="/tmp/lupine-driver-server-${MATRIX_LABEL}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
              export SSH_OPTS="-i /tmp/lupine-ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/tmp/lupine-ssh/known_hosts -o ConnectTimeout=15 -o ConnectionAttempts=1 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
              export SAMPLE_SUITE=compliance
              export BUILD_SAMPLES=0
              export SAMPLE_TIMEOUT="$CUDA_SAMPLE_TIMEOUT"
              export LONG_SAMPLE_TIMEOUT="$CUDA_LONG_SAMPLE_TIMEOUT"
              export TEST_TIMEOUT="$PYTORCH_TEST_TIMEOUT"
              export PYTORCH_SKIP_LIST=compile_elementwise,microgpt_train
              export CUDA_SAMPLE_SKIP_LIST="${CUDA_SAMPLE_SKIP_LIST:-}"
              export CUDA_SAMPLES_DIR="/tmp/cuda-samples-${MATRIX_LABEL}"
              export CUDA_SAMPLES_BUILD_DIR="$CUDA_SAMPLES_DIR/build"
              export CUDA_SAMPLES_ARCH=89

              python3 -m venv /tmp/venv-pytorch
              /tmp/venv-pytorch/bin/pip install --upgrade pip >/dev/null
              /tmp/venv-pytorch/bin/pip install numpy >/dev/null
              /tmp/venv-pytorch/bin/pip install --index-url "$PYTORCH_INDEX_URL" torch >/dev/null
              export PYTHON_BIN=/tmp/venv-pytorch/bin/python

              cmake -S /src -B /tmp/lupine-build \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCUDAToolkit_ROOT="$CUDA_HOME" \
                -DCMAKE_LIBRARY_PATH="$CUDA_HOME/lib64/stubs"
              cmake --build /tmp/lupine-build --parallel \
                --target lupine_driver lupine_nvml
              ln -sf libcuda.so.1 /tmp/lupine-build/libcuda.so
              ln -sf libnvidia-ml.so.1 /tmp/lupine-build/libnvidia-ml.so

              BUILD_ONLY=1 BUILD_SAMPLES=auto SAMPLE_SUITE=extended \
                /src/test/run_cuda_samples.sh

              cuda_status=0
              SERVER_PORT_BASE="$CUDA_SAMPLES_PORT_BASE" \
                RESULTS_DIR="/src/test/cuda-samples/results/${MATRIX_LABEL}" \
                /src/test/run_cuda_samples.sh || cuda_status=$?

              pytorch_status=0
              SERVER_PORT_BASE="$PYTORCH_PORT_BASE" \
                RESULTS_DIR="/src/test/pytorch/results/${MATRIX_LABEL}" \
                /src/test/run_pytorch_lupine_tests.sh || pytorch_status=$?

              custom_status=0
              SERVER_PORT="$CUSTOM_PORT" \
                /src/test/run_custom_tests.sh || custom_status=$?

              if [[ "$cuda_status" -ne 0 || "$pytorch_status" -ne 0 || "$custom_status" -ne 0 ]]; then
                echo "CUDA samples exited $cuda_status; PyTorch exited $pytorch_status; custom tests exited $custom_status" >&2
                exit 1
              fi
            '

      - name: Upload compliance results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gpu-integration-results-${{ matrix.label }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            test/cuda-samples/results/
            test/pytorch/results/
          if-no-files-found: ignore

      - name: Delete matrix runner firewall allow rule
        if: always()
        run: |
          set -euo pipefail
          if [[ -n "${FIREWALL_ALLOW_RULE:-}" ]]; then
            gcloud compute firewall-rules delete "$FIREWALL_ALLOW_RULE" \
              --project="$GCP_PROJECT_ID" \
              --quiet || true
          fi

  cleanup-l4:
    name: Cleanup GCE L4
    needs:
      - provision-l4
      - gpu-integration
    if: always() && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Tear down GCE resources
        run: |
          set -euo pipefail

          # shellcheck disable=SC2206
          fallback_zones=($GCP_FALLBACK_ZONES)
          candidate_zones=("${{ needs.provision-l4.outputs.gcp_zone }}" "$GCP_ZONE" "${fallback_zones[@]}")

          for zone in "${candidate_zones[@]}"; do
            if [[ -z "$zone" ]]; then
              continue
            fi
            gcloud compute instances delete "$VM_NAME" \
              --project="$GCP_PROJECT_ID" \
              --zone="$zone" \
              --quiet || true
          done

          rules=(
            "$FIREWALL_DENY_RULE"
            "${VM_NAME}-provision-allow"
            "${VM_NAME}-cuda13-1-allow"
            "${VM_NAME}-cuda12-4-allow"
            "${VM_NAME}-cuda11-8-allow"
          )
          for rule in "${rules[@]}"; do
            gcloud compute firewall-rules delete "$rule" \
              --project="$GCP_PROJECT_ID" \
              --quiet || true
          done

          leftovers=0
          for zone in "${candidate_zones[@]}"; do
            if [[ -z "$zone" ]]; then
              continue
            fi
            if gcloud compute instances describe "$VM_NAME" \
              --project="$GCP_PROJECT_ID" \
              --zone="$zone" >/dev/null 2>&1; then
              echo "leftover VM still exists in $zone: $VM_NAME" >&2
              leftovers=1
            fi
          done

          for rule in "${rules[@]}"; do
            if gcloud compute firewall-rules describe "$rule" \
              --project="$GCP_PROJECT_ID" >/dev/null 2>&1; then
              echo "leftover firewall rule still exists: $rule" >&2
              leftovers=1
            fi
          done

          exit "$leftovers"
