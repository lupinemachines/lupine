name: Codegen Test

on:
  pull_request:
  workflow_dispatch:

jobs:
  codegen:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "13.1.0"
          method: network
          sub-packages: '["nvcc"]'

      - name: Install codegen dependencies
        run: |
          python3 -m venv .venv-codegen
          .venv-codegen/bin/pip install --no-cache-dir -r codegen/requirements.txt

      - name: Regenerate checked-in sources
        run: |
          sudo ln -sfn "$CUDA_PATH" /usr/local/cuda
          cd codegen
          ../.venv-codegen/bin/python ./codegen.py

      - name: Format generated C++
        run: |
          clang-format -i \
            codegen/gen_client.cpp \
            codegen/gen_nvml_client.inc \
            codegen/gen_nvml_server.h \
            codegen/gen_nvml_server.inc \
            codegen/gen_server.cpp

      - name: Test generated handler cleanup
        run: python3 -m unittest discover -s codegen/tests -v

      - name: Verify generated files are current
        run: git diff --exit-code -- codegen
